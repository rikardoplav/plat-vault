<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">Market insights chart placeholder</title>
  <desc id="desc">Elegant placeholder for sales and rental price trend charts.</desc>
  <rect width="1400" height="1000" fill="#f8f3ea"/>
  <rect x="70" y="70" width="1260" height="860" fill="#fffdf8" stroke="#c8a46b" stroke-width="2"/>
  <text x="120" y="150" fill="#0d1828" font-family="Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="8">LOCAL MARKET INSIGHTS</text>
  <line x1="120" y1="190" x2="1280" y2="190" stroke="#c8a46b" stroke-width="2" opacity="0.65"/>
  <g transform="translate(120 270)">
    <text x="0" y="0" fill="#0d1828" font-family="Arial, sans-serif" font-size="28" font-weight="700">Sales Price Trend</text>
    <rect x="0" y="50" width="520" height="300" fill="#faf7f1" stroke="#d9c39f"/>
    <polyline points="45,245 130,220 210,230 295,170 380,135 475,80" fill="none" stroke="#9b6b3d" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="475" cy="80" r="11" fill="#c8a46b"/>
    <text x="330" y="52" fill="#9b6b3d" font-family="Arial, sans-serif" font-size="30" font-weight="700">+14.98%</text>
  </g>
  <g transform="translate(760 270)">
    <text x="0" y="0" fill="#0d1828" font-family="Arial, sans-serif" font-size="28" font-weight="700">Rental Price Trend</text>
    <rect x="0" y="50" width="520" height="300" fill="#faf7f1" stroke="#d9c39f"/>
    <polyline points="45,240 120,200 205,142 285,88 365,150 475,118" fill="none" stroke="#0d1828" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="475" cy="118" r="11" fill="#c8a46b"/>
    <text x="330" y="52" fill="#9b6b3d" font-family="Arial, sans-serif" font-size="30" font-weight="700">+14.99%</text>
  </g>
  <g fill="#0d1828" font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <text x="120" y="760">Average sales asking price: €1,673/m²</text>
    <text x="120" y="815">Average rental asking rent: €8.82/m²/month</text>
    <text x="120" y="870">Foreign demand in Macerata province: 22.59%</text>
  </g>
</svg>
